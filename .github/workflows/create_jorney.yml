name: jorney

on:
  workflow_dispatch:
    inputs:
      param1:
        description: "from_station"
        required: true
        default: "Berlin Hbf"
      param2:
        description: "to_station"
        required: true
        default: "München Hbf"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Vendo Client Script
        run: |
          node jorney/jorney_script.cjs "${{ github.event.inputs.fromName }}" "${{ github.event.inputs.toName }}"

      - name: Upload JSON output
        uses: actions/upload-artifact@v4
        with:
          name: journey-output
          path: jorney/output/journeys.json
